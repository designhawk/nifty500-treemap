  <rect x="480" y="492" width="170" height="78" rx="2" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="500" y="537" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#5a5755" letter-spacing="1.5">BANKS</text>

  <rect x="670" y="452" width="170" height="118" rx="2" fill="#1c1c1a"/>
  <rect x="670" y="452" width="170" height="118" rx="2" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="690" y="497" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#5a5755" letter-spacing="1.5">REALTY</text>

