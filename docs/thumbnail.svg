  <text x="500" y="85" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#5a5755" letter-spacing="1.5">PRIVATE BANK</text>

  <rect x="780" y="40" width="200" height="180" rx="2" fill="#1c1c1a"/>
  <rect x="780" y="40" width="200" height="180" rx="2" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="800" y="85" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#5a5755" letter-spacing="1.5">SOFTWARE</text>

  <rect x="1000" y="40" width="160" height="200" rx="2" fill="#1c1c1a"/>
  <rect x="1000" y="40" width="160" height="200" rx="2" fill="none" stroke="#2A2A28" stroke-width="1"/>
