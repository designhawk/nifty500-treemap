<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111110"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#057805"/>

  <!-- LEFT: Text block -->
  <text x="60" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="400" fill="#DEDAD4" letter-spacing="0.01">Nifty 500</text>
  <text x="62" y="158" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#858280" letter-spacing="0.03">Market Treemap</text>
  <rect x="62" y="178" width="300" height="1" fill="#2A2A28"/>
  <text x="62" y="212" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="300" fill="#9A9793" letter-spacing="0.03">124 sectors · 500 stocks</text>
  <text x="62" y="578" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" fill="#4a4a48" letter-spacing="0.04">Source: NSE India · Yahoo Finance</text>
  <text x="62" y="600" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" fill="#2e2e2c" letter-spacing="0.04">Updated daily</text>

  <!-- TREEMAP GRID (right side, x=480 to 1160) -->
