<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111110"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
    <linearGradient id="greenFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#057805" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#035803" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="redFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aa2828" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7a1a1a" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line (green) -->
  <rect x="0" y="0" width="1200" height="3" fill="#057805"/>

  <!-- LEFT SIDE: Text content -->
  <!-- Main title - DM Serif Display style -->
  <text x="60" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="400" fill="#DEDAD4" letter-spacing="0.01">Nifty 500</text>

  <!-- Subtitle - DM Sans style -->
  <text x="62" y="168" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#858280" letter-spacing="0.03">Market Treemap</text>

  <!-- Divider line -->
  <rect x="62" y="192" width="340" height="1" fill="#2A2A28"/>

  <!-- Stats -->
  <text x="62" y="230" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="300" fill="#9A9793" letter-spacing="0.03">124 sectors</text>
  <text x="210" y="230" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="300" fill="#858280"> · </text>
  <text x="232" y="230" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="300" fill="#9A9793">500 stocks</text>

  <!-- Bottom left -->
  <text x="62" y="580" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="300" fill="#5a5755" letter-spacing="0.04">Source: NSE India · Yahoo Finance</text>
  <text x="62" y="604" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="300" fill="#3a3a3a" letter-spacing="0.04">Updated daily</text>

  <!-- RIGHT SIDE: Treemap blocks - warm dark tones -->
  <!-- IT block (largest - blue-green) -->
  <rect x="500" y="60" width="380" height="190" rx="3" fill="#1a2e1a"/>
  <rect x="500" y="60" width="380" height="190" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="522" y="106" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#9A9793" letter-spacing="1.5" text-transform="uppercase">IT</text>
  <text x="522" y="145" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="300" fill="#057805">▲ 0.6%</text>
  <text x="522" y="178" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" font-weight="300" fill="#5a5755">TCS · Infosys · HCL</text>

  <!-- Financials block -->
  <rect x="896" y="60" width="244" height="120" rx="3" fill="#1e1a1a"/>
  <rect x="896" y="60" width="244" height="120" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="918" y="100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">FINANCIALS</text>
  <text x="918" y="136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="300" fill="#aa2828">▼ 1.8%</text>

  <!-- Auto block -->
  <rect x="896" y="196" width="244" height="80" rx="3" fill="#1a1a1e"/>
  <rect x="896" y="196" width="244" height="80" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="918" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">AUTO</text>
  <text x="1040" y="228" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#aa2828" text-anchor="middle">▼ 1.6%</text>

  <!-- Pharma block -->
  <rect x="500" y="266" width="170" height="120" rx="3" fill="#1a1e1a"/>
  <rect x="500" y="266" width="170" height="120" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="522" y="306" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">PHARMA</text>
  <text x="522" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#057805">▲ 1.1%</text>

  <!-- FMCG block -->
  <rect x="686" y="266" width="190" height="120" rx="3" fill="#1a1e1a"/>
  <rect x="686" y="266" width="190" height="120" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="708" y="306" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">FMCG</text>
  <text x="708" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#057805">▲ 0.6%</text>

  <!-- Metals block -->
  <rect x="896" y="292" width="244" height="120" rx="3" fill="#1e1a1a"/>
  <rect x="896" y="292" width="244" height="120" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="918" y="332" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">METALS</text>
  <text x="918" y="366" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="300" fill="#aa2828">▼ 2.0%</text>

  <!-- Energy block (bottom left) -->
  <rect x="500" y="402" width="240" height="148" rx="3" fill="#1a1e1a"/>
  <rect x="500" y="402" width="240" height="148" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="522" y="442" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#9A9793" letter-spacing="1.5">ENERGY</text>
  <text x="522" y="482" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="300" fill="#057805">▲ 3.2%</text>
  <text x="522" y="512" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="300" fill="#5a5755">Reliance · ONGC · NTPC</text>

  <!-- Banks small block -->
  <rect x="756" y="402" width="150" height="72" rx="3" fill="#1a1a1e"/>
  <rect x="756" y="402" width="150" height="72" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="778" y="430" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#9A9793" letter-spacing="1.5">BANKS</text>
  <text x="778" y="458" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#aa2828">▼ 3.5%</text>

  <!-- Telecom small block -->
  <rect x="756" y="490" width="150" height="60" rx="3" fill="#1e1a1a"/>
  <rect x="756" y="490" width="150" height="60" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="778" y="518" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#9A9793" letter-spacing="1.5">TELECOM</text>
  <text x="900" y="518" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="300" fill="#aa2828" text-anchor="middle">▼ 2.9%</text>

  <!-- Real Estate block -->
  <rect x="922" y="428" width="218" height="72" rx="3" fill="#1a1e1a"/>
  <rect x="922" y="428" width="218" height="72" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="944" y="456" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#9A9793" letter-spacing="1.5">REAL ESTATE</text>
  <text x="944" y="484" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="300" fill="#aa2828">▼ 2.8%</text>

  <!-- Construction tiny block -->
  <rect x="922" y="516" width="218" height="54" rx="3" fill="#1a1a1e"/>
  <rect x="922" y="516" width="218" height="54" rx="3" fill="none" stroke="#2A2A28" stroke-width="1"/>
  <text x="944" y="542" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" fill="#9A9793" letter-spacing="1.5">CONSTRUCTION</text>
  <text x="1070" y="542" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="300" fill="#aa2828" text-anchor="middle">▼ 2.6%</text>
</svg>