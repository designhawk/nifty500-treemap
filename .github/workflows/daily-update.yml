name: Daily Market Data Update

on:
  schedule:
    - cron: '0 11 * * *'  # Daily at 11:00 UTC = 4:30 PM IST
  workflow_dispatch:           # Manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Fetch Nifty 500 list
        run: uv run python scripts/get_nifty500.py

      - name: Fetch stock data
        run: uv run python fetch_data.py

      - name: Build site data
        run: uv run python build_site_data.py

      - name: Deploy to Cloudflare Pages
        run: |
          npm install -g wrangler
          wrangler pages deploy docs/ --project-name=finance --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
