name: Daily Market Data Update

on:
  schedule:
    - cron: '0 11 * * *'  # Daily at 11:00 UTC = 4:30 PM IST
  workflow_dispatch:           # Manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Fetch Nifty 500 list
        run: uv run python scripts/get_nifty500.py

      - name: Fetch stock data
        run: uv run python fetch_data.py

      - name: Build site data
        run: uv run python build_site_data.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add docs/data.json nifty500.csv

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update market data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
